    directory_blurb: "A circular chamber with a domed ceiling adorned with an array of mechanical gears. In the center of the room, a stone podium serves as a central pivot point for the chamber's true purpose: rotation. A fitting function for a room named Rotunda , which means \"clockwise room\" in Erajan."
